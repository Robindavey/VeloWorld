<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeloVerse Upload Route</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #0b1220;
            --panel: rgba(14, 24, 40, 0.88);
            --text: #e8f0ff;
            --muted: #96a4bf;
            --accent: #1bb877;
            --border: rgba(151, 170, 201, 0.3);
            --danger: #d62828;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f7fbff;
                --panel: rgba(255, 255, 255, 0.94);
                --text: #1a2a3f;
                --muted: #56657d;
                --accent: #0c9b61;
                --border: rgba(45, 73, 112, 0.22);
                --danger: #b42318;
            }
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 15%, rgba(22, 126, 251, 0.14), transparent 38%),
                radial-gradient(circle at 80% 0%, rgba(27, 184, 119, 0.18), transparent 36%),
                linear-gradient(180deg, var(--bg), color-mix(in oklab, var(--bg), black 8%));
            min-height: 100vh;
            padding: 24px;
        }

        .frame {
            max-width: 920px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(6px);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: clamp(1.4rem, 2vw, 2rem); }
        p { color: var(--muted); }

        .btn, button {
            border: 1px solid var(--border);
            background: #0e1f38;
            color: #f7fbff;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        @media (prefers-color-scheme: light) {
            .btn, button { background: #124ea1; color: #fff; }
        }

        .btn.secondary {
            background: transparent;
            color: var(--text);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .full { grid-column: 1 / -1; }

        label { font-weight: 600; font-size: 0.95rem; }
        input, textarea {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            background: color-mix(in oklab, var(--panel), black 8%);
            color: var(--text);
        }

        #upload-message { margin: 12px 0 0; min-height: 1.3em; font-weight: 600; }
        .ok { color: var(--accent); }
        .bad { color: var(--danger); }

        #status-list { margin-top: 18px; display: grid; gap: 8px; }
        .status-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            background: color-mix(in oklab, var(--panel), black 5%);
        }

        @media (max-width: 760px) {
            body { padding: 14px; }
            .frame { padding: 16px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="frame">
        <div class="top">
            <h1>Upload Route</h1>
            <div>
                <a class="btn secondary" href="/index.html">Dashboard</a>
                <a class="btn secondary" href="/route-3d.html">Route 3D</a>
            </div>
        </div>
        <p>Select a GPX/FIT/TCX route, upload it, and track processing status until it is ready.</p>

        <div class="grid">
            <div class="field">
                <label for="route-name">Route Name</label>
                <input type="text" id="route-name" placeholder="Optional - fallback to filename" />
            </div>
            <div class="field">
                <label for="route-file">Route File</label>
                <input type="file" id="route-file" accept=".gpx,.fit,.fits,.tcx" required />
            </div>
            <div class="field full">
                <label for="route-description">Description</label>
                <textarea id="route-description" rows="3" placeholder="Optional description"></textarea>
            </div>
        </div>

        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="uploadRoute()">Upload Route</button>
            <button class="btn secondary" onclick="refreshRoutes()">Refresh Status</button>
        </div>

        <p id="upload-message"></p>
        <section id="status-list"></section>
    </main>

    <script>
        function resolveApiBase() {
            const raw = (localStorage.getItem('veloverse_api_base') || '').trim();
            if (!raw || raw === '/' || raw === '//' || raw === '/auth' || raw === '/routes') {
                return '/api';
            }
            if (raw.startsWith('http://') || raw.startsWith('https://') || raw.startsWith('/')) {
                return raw.replace(/\/+$/, '');
            }
            return '/api';
        }

        const API_BASE = resolveApiBase();
        const API_HOST_FALLBACK = `http://${window.location.hostname}:8080`;
        const API_LOCALHOST_FALLBACK = 'http://localhost:8080';
        const authToken = localStorage.getItem('veloverse_token');
        if (!authToken) window.location.href = '/index.html';

        function apiCandidates(path) {
            const cleanPath = path.startsWith('/') ? path : `/${path}`;
            const candidates = [`${API_BASE}${cleanPath}`];

            const isHttpsPage = window.location.protocol === 'https:';
            if (!isHttpsPage) {
                candidates.push(`${API_HOST_FALLBACK}${cleanPath}`);
            }

            const isLocalBrowser = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (!isHttpsPage && isLocalBrowser) {
                candidates.push(`${API_LOCALHOST_FALLBACK}${cleanPath}`);
            }

            return [...new Set(candidates)];
        }

        async function apiFetch(path, options = {}) {
            const targets = apiCandidates(path);
            let lastError = null;

            for (let i = 0; i < targets.length; i++) {
                const target = targets[i];
                try {
                    const resp = await fetch(target, options);
                    const firstAttemptOnProxyPath = (i === 0 && API_BASE.startsWith('/'));
                    if (firstAttemptOnProxyPath && (resp.status === 404 || resp.status === 501)) {
                        continue;
                    }
                    if (resp.status === 501) {
                        continue;
                    }
                    return resp;
                } catch (err) {
                    lastError = err;
                }
            }
            throw (lastError || new Error('Network request failed'));
        }

        async function readApiPayload(response) {
            const text = await response.text();
            let json = null;
            if (text) {
                try {
                    json = JSON.parse(text);
                } catch (_) {
                    json = null;
                }
            }
            return { text, json };
        }

        function apiErrorMessage(response, payload, fallback) {
            if (response.status === 401) {
                return 'Your session expired. Please log in again.';
            }
            const fromJson = payload?.json?.error || payload?.json?.message;
            const fromText = (payload?.text || '').trim();
            return fromJson || fromText || fallback;
        }

        let activePoll = null;

        function setMessage(text, isError = false) {
            const el = document.getElementById('upload-message');
            el.textContent = text;
            el.className = isError ? 'bad' : 'ok';
        }

        function formatStatus(status) {
            if (!status) return 'unknown';
            return String(status).replace(/_/g, ' ');
        }

        async function uploadRoute() {
            const fileInput = document.getElementById('route-file');
            const name = document.getElementById('route-name').value.trim();
            const description = document.getElementById('route-description').value.trim();

            if (!fileInput.files[0]) {
                setMessage('Please select a route file first.', true);
                return;
            }

            const formData = new FormData();
            formData.append('route_file', fileInput.files[0]);
            if (name) formData.append('name', name);
            if (description) formData.append('description', description);

            setMessage('Uploading route...');

            try {
                const response = await apiFetch('/routes', {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${authToken}` },
                    body: formData
                });
                const payload = await readApiPayload(response);
                const data = payload.json || {};

                if (!response.ok) {
                    setMessage(apiErrorMessage(response, payload, 'Upload failed.'), true);
                    return;
                }

                const routeId = data.id || data.route_id || data.route?.id || null;
                setMessage('Upload complete. Checking processing status...');
                fileInput.value = '';
                document.getElementById('route-name').value = '';
                document.getElementById('route-description').value = '';

                await refreshRoutes();
                if (routeId) pollRouteStatus(routeId);
            } catch (error) {
                setMessage(`Network error: ${error?.message || error}`, true);
            }
        }

        async function refreshRoutes() {
            try {
                const response = await apiFetch('/routes', {
                    headers: { Authorization: `Bearer ${authToken}` }
                });
                const payload = await readApiPayload(response);
                if (!response.ok) throw new Error(apiErrorMessage(response, payload, 'Failed to load routes'));
                const routes = Array.isArray(payload.json) ? payload.json : [];
                renderStatuses(routes);
                return routes;
            } catch (error) {
                setMessage(`Unable to refresh status: ${error?.message || error}`, true);
                return [];
            }
        }

        function renderStatuses(routes) {
            const list = document.getElementById('status-list');
            if (!routes.length) {
                list.innerHTML = '<div class="status-card">No routes uploaded yet.</div>';
                return;
            }

            const sorted = [...routes]
                .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))
                .slice(0, 8);

            list.innerHTML = sorted.map(route => `
                <div class="status-card">
                    <strong>${route.name || 'Unnamed route'}</strong>
                    <div>Status: ${formatStatus(route.processing_status)}</div>
                    <div>Distance: ${route.distance_m ? (route.distance_m / 1000).toFixed(1) + ' km' : 'pending'}</div>
                    <div style="margin-top:8px;">
                        <button class="btn secondary" onclick="deleteRoute('${route.id}', '${(route.name || 'this route').replace(/'/g, "\\'")}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteRoute(routeId, routeName) {
            if (!routeId) return;
            const ok = window.confirm(`Are you sure you want to delete ${routeName || 'this route'}?`);
            if (!ok) return;

            try {
                const response = await apiFetch(`/routes/${routeId}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${authToken}` }
                });
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || 'Failed to delete route');
                }
                setMessage('Route deleted.');
                await refreshRoutes();
            } catch (error) {
                setMessage(`Delete failed: ${error?.message || error}`, true);
            }
        }

        async function retryRouteProcessing(routeId) {
            const response = await apiFetch(`/routes/${routeId}/retry`, {
                method: 'POST',
                headers: { Authorization: `Bearer ${authToken}` }
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || 'Failed to retry route processing');
            }
        }

        function pollRouteStatus(routeId) {
            if (activePoll) clearInterval(activePoll);
            let attempts = 0;
            let lastRetryAttempt = 0;
            const retryStatuses = new Set(['queued', 'processing', 'failed', 'pending']);
            const retryIntervalAttempts = 12;

            activePoll = setInterval(async () => {
                attempts += 1;
                const routes = await refreshRoutes();
                const route = routes.find(r => String(r.id) === String(routeId));
                const status = route?.processing_status;

                if (!route) return;
                if (status === 'ready') {
                    clearInterval(activePoll);
                    activePoll = null;
                    setMessage('Done: route processing is ready.');
                } else {
                    if (retryStatuses.has(String(status || '').toLowerCase()) && (attempts - lastRetryAttempt) >= retryIntervalAttempts) {
                        lastRetryAttempt = attempts;
                        try {
                            await retryRouteProcessing(routeId);
                            setMessage(`Processing status: ${formatStatus(status)}. Retrying in background...`);
                            return;
                        } catch (retryError) {
                            setMessage(`Processing status: ${formatStatus(status)}. Retry failed: ${retryError?.message || retryError}`, true);
                        }
                    }
                    setMessage(`Processing status: ${formatStatus(status)}...`);
                }
            }, 3000);
        }

        window.onload = () => {
            refreshRoutes();
        };
    </script>
</body>
</html>
