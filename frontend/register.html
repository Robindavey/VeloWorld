<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloVerse - Register</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); color: #f0f6fc; min-height: 100vh; }
        .container { max-width: 900px; margin: 40px auto; padding: 30px; background: rgba(22, 27, 34, 0.95); border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid #30363d; }
        h1 { text-align: center; background: linear-gradient(45deg, #58a6ff, #f78166); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #c9d1d9; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: #f0f6fc; box-sizing: border-box; }
        button { padding: 12px 20px; background: #238636; color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; }
        button:hover { background: #2ea043; transform: translateY(-1px); }
        .hidden { display: none; }
        a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚴 VeloVerse - Register</h1>
        <p>Create an account to upload routes and start riding.</p>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your display name">
        </div>
        <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" rows="3" placeholder="Tell us about yourself (optional)"></textarea>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password">
        </div>
        <button onclick="register()">Register</button>
        <p id="auth-message"></p>
        <p><a href="/index.html">Already have an account? Login</a></p>
    </div>

    <script>
        function resolveApiBase() {
            const raw = (localStorage.getItem('veloverse_api_base') || '').trim();
            if (!raw || raw === '/' || raw === '//' || raw === '/auth' || raw === '/routes') {
                return '/api';
            }
            if (raw.startsWith('http://') || raw.startsWith('https://') || raw.startsWith('/')) {
                return raw.replace(/\/+$/, '');
            }
            return '/api';
        }

        const API_BASE = resolveApiBase();
        const API_HOST_FALLBACK = `http://${window.location.hostname}:8080`;
        const API_LOCALHOST_FALLBACK = 'http://localhost:8080';

        function apiCandidates(path) {
            const cleanPath = path.startsWith('/') ? path : `/${path}`;
            const candidates = [`${API_BASE}${cleanPath}`];

            const isHttpsPage = window.location.protocol === 'https:';
            if (!isHttpsPage) {
                candidates.push(`${API_HOST_FALLBACK}${cleanPath}`);
            }

            const isLocalBrowser = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (!isHttpsPage && isLocalBrowser) {
                candidates.push(`${API_LOCALHOST_FALLBACK}${cleanPath}`);
            }

            return [...new Set(candidates)];
        }

        async function apiFetch(path, options = {}) {
            const targets = apiCandidates(path);
            let lastError = null;

            for (let i = 0; i < targets.length; i++) {
                const target = targets[i];
                try {
                    const resp = await fetch(target, options);
                    const firstAttemptOnProxyPath = (i === 0 && API_BASE.startsWith('/'));
                    if (firstAttemptOnProxyPath && (resp.status === 404 || resp.status === 501)) {
                        continue;
                    }
                    if (resp.status === 501) {
                        continue;
                    }
                    return resp;
                } catch (err) {
                    lastError = err;
                }
            }
            throw (lastError || new Error('Network request failed'));
        }

        async function register() {
            const name = document.getElementById('name').value;
            const bio = document.getElementById('bio').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                document.getElementById('auth-message').textContent = 'Email and password are required';
                return;
            }

            try {
                const response = await apiFetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name, bio })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('auth-message').textContent = 'Registration successful! Please login.';
                } else {
                    const errorText = await response.text();
                    document.getElementById('auth-message').textContent = errorText || 'Registration failed';
                }
            } catch (error) {
                document.getElementById('auth-message').textContent = 'Network error';
            }
        }
    </script>
</body>
</html>
