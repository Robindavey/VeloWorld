<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloWorld Rider Profile</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#0d1117; color:#f0f6fc; }
        .container { max-width:750px; margin:24px auto; padding:16px; background:#161b22; border:1px solid #30363d; border-radius:10px; }
        h1, h2 { margin:10px 0; }
        .field { margin: 10px 0; }
        label { display:block; margin-bottom:4px; color:#8b949e; }
        input, textarea { width:100%; padding:8px 10px; border:1px solid #30363d; border-radius:6px; background:#0d1117; color:#f0f6fc; }
        button { margin:6px 4px 0 0; padding:8px 12px; border:1px solid #30363d; border-radius:6px; background:#238636; color:#fff; cursor:pointer; }
        .secondary { background:#0f6cbd; }
        .status { padding:8px; margin-top:12px; border-radius:6px; }
        .status.error { background:#67000d; color:#ffe3e6; }
        .status.ok { background:#0f6; color:#002900; }
        a { color:#58a6ff; text-decoration:none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/index.html">↩ Home</a>
        <h1>Rider Profile</h1>
        <div class="field"><label>Email</label><input id="email" readonly></div>
        <div class="field"><label>Name</label><input id="name"></div>
        <div class="field"><label>Bio</label><textarea id="bio" rows="3"></textarea></div>
        <div class="field"><label>Weight (kg)</label><input id="weight" type="number" min="35" max="250" step="0.5"></div>
        <div class="field"><label>FTP (W)</label><input id="ftp" type="number" min="80" max="600" step="1"></div>
        <button onclick="saveProfile()">Save Profile</button>
        <h2>Change Password</h2>
        <div class="field"><label>Current Password</label><input id="oldPassword" type="password"></div>
        <div class="field"><label>New Password</label><input id="newPassword" type="password"></div>
        <div class="field"><label>Confirm New Password</label><input id="confirmPassword" type="password"></div>
        <button class="secondary" onclick="changePassword()">Change Password</button>
        <div id="message" class="status" style="display:none"></div>
    </div>
    <script>
        const API_BASE = 'http://localhost:8080';
        const token = localStorage.getItem('veloworld_token');
        if (!token) window.location.href = '/index.html';

        function showStatus(message, ok=true) {
            const e = document.getElementById('message');
            e.style.display = 'block';
            e.className = 'status ' + (ok ? 'ok' : 'error');
            e.textContent = message;
            setTimeout(()=>{e.style.display='none';},5000);
        }

        async function loadProfile() {
            try {
                const resp = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Failed to fetch profile');
                document.getElementById('email').value = data.email || '';
                document.getElementById('name').value = data.name || '';
                document.getElementById('bio').value = data.bio || '';
                document.getElementById('weight').value = data.rider_weight_kg || 75;
                document.getElementById('ftp').value = data.ftp_w || 210;
            } catch (err) {
                showStatus('Load profile error: ' + err.message, false);
            }
        }

        async function saveProfile() {
            const name = document.getElementById('name').value;
            const bio = document.getElementById('bio').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const ftp = parseFloat(document.getElementById('ftp').value);

            try {
                const resp = await fetch(`${API_BASE}/auth/profile`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json', Authorization: `Bearer ${token}`},
                    body: JSON.stringify({name, bio, rider_weight_kg: weight, ftp_w: ftp})
                });
                if (!resp.ok) { const text = await resp.text(); throw new Error(text || 'Save failed'); }
                showStatus('Profile saved', true);
            } catch (err) {
                showStatus('Save profile failed: ' + err.message, false);
            }
        }

        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (!oldPassword || !newPassword || !confirmPassword) { showStatus('Please fill all password fields', false); return; }
            if (newPassword !== confirmPassword) { showStatus('New passwords do not match', false); return; }

            try {
                const resp = await fetch(`${API_BASE}/auth/password`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json', Authorization: `Bearer ${token}`},
                    body: JSON.stringify({old_password: oldPassword, new_password: newPassword})
                });
                if (!resp.ok) { const text = await resp.text(); throw new Error(text || 'Password change failed'); }
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                showStatus('Password changed successfully', true);
            } catch (err) {
                showStatus('Change password failed: ' + err.message, false);
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
