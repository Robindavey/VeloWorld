<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloVerse Rider Profile</title>
    <style>
        body { margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); color:#f0f6fc; min-height:100vh; }
        .container { max-width:750px; margin:40px auto; padding:30px; background: rgba(22, 27, 34, 0.95); border-radius:15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border:1px solid #30363d; }
        h1, h2 { margin:10px 0; color:#58a6ff; }
        .field { margin: 15px 0; }
        label { display:block; margin-bottom:5px; color:#c9d1d9; }
        input, textarea { width:100%; padding:10px 12px; border:1px solid #30363d; border-radius:6px; background:#0d1117; color:#f0f6fc; box-sizing:border-box; }
        button { margin:8px 6px 0 0; padding:12px 20px; background:#238636; color:#fff; border:none; border-radius:6px; cursor:pointer; transition: all 0.3s ease; }
        button:hover { background:#2ea043; transform:translateY(-1px); }
        .secondary { background:#0f6cbd; }
        .secondary:hover { background:#1f77d0; }
        .status { padding:10px; margin-top:15px; border-radius:6px; }
        .status.error { background:#67000d; color:#ffe3e6; }
        .status.ok { background:#0f6; color:#002900; }
        a { color:#58a6ff; text-decoration:none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/index.html">↩ Home</a>
        <h1>Rider Profile</h1>
        <div class="field"><label>Email</label><input id="email" readonly></div>
        <div class="field"><label>Name</label><input id="name"></div>
        <div class="field"><label>Bio</label><textarea id="bio" rows="3"></textarea></div>
        <div class="field"><label>Weight (kg)</label><input id="weight" type="number" min="35" max="250" step="0.5"></div>
        <div class="field"><label>FTP (W)</label><input id="ftp" type="number" min="80" max="600" step="1"></div>
        <button onclick="saveProfile()">Save Profile</button>
        <h2>Change Password</h2>
        <div class="field"><label>Current Password</label><input id="oldPassword" type="password"></div>
        <div class="field"><label>New Password</label><input id="newPassword" type="password"></div>
        <div class="field"><label>Confirm New Password</label><input id="confirmPassword" type="password"></div>
        <button class="secondary" onclick="changePassword()">Change Password</button>
        <div id="message" class="status" style="display:none"></div>
    </div>
    <script>
        function resolveApiBase() {
            const raw = (localStorage.getItem('veloverse_api_base') || '').trim();
            if (!raw || raw === '/' || raw === '//' || raw === '/auth' || raw === '/routes') {
                return '/api';
            }
            if (raw.startsWith('http://') || raw.startsWith('https://') || raw.startsWith('/')) {
                return raw.replace(/\/+$/, '');
            }
            return '/api';
        }

        const API_BASE = resolveApiBase();
        const API_HOST_FALLBACK = `http://${window.location.hostname}:8080`;
        const API_LOCALHOST_FALLBACK = 'http://localhost:8080';
        const token = localStorage.getItem('veloverse_token');
        if (!token) window.location.href = '/index.html';

        function apiCandidates(path) {
            const cleanPath = path.startsWith('/') ? path : `/${path}`;
            const candidates = [`${API_BASE}${cleanPath}`];

            const isHttpsPage = window.location.protocol === 'https:';
            if (!isHttpsPage) {
                candidates.push(`${API_HOST_FALLBACK}${cleanPath}`);
            }

            const isLocalBrowser = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (!isHttpsPage && isLocalBrowser) {
                candidates.push(`${API_LOCALHOST_FALLBACK}${cleanPath}`);
            }

            return [...new Set(candidates)];
        }

        async function apiFetch(path, options = {}) {
            const targets = apiCandidates(path);
            let lastError = null;

            for (let i = 0; i < targets.length; i++) {
                const target = targets[i];
                try {
                    const resp = await fetch(target, options);
                    const firstAttemptOnProxyPath = (i === 0 && API_BASE.startsWith('/'));
                    if (firstAttemptOnProxyPath && (resp.status === 404 || resp.status === 501)) {
                        continue;
                    }
                    if (resp.status === 501) {
                        continue;
                    }
                    return resp;
                } catch (err) {
                    lastError = err;
                }
            }
            throw (lastError || new Error('Network request failed'));
        }

        function showStatus(message, ok=true) {
            const e = document.getElementById('message');
            e.style.display = 'block';
            e.className = 'status ' + (ok ? 'ok' : 'error');
            e.textContent = message;
            setTimeout(()=>{e.style.display='none';},5000);
        }

        async function loadProfile() {
            try {
                const resp = await apiFetch('/auth/me', { headers: { Authorization: `Bearer ${token}` } });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Failed to fetch profile');
                document.getElementById('email').value = data.email || '';
                document.getElementById('name').value = data.name || '';
                document.getElementById('bio').value = data.bio || '';
                document.getElementById('weight').value = data.rider_weight_kg || 75;
                document.getElementById('ftp').value = data.ftp_w || 210;
            } catch (err) {
                showStatus('Load profile error: ' + err.message, false);
            }
        }

        async function saveProfile() {
            const name = document.getElementById('name').value;
            const bio = document.getElementById('bio').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const ftp = parseFloat(document.getElementById('ftp').value);

            try {
                const resp = await apiFetch('/auth/profile', {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json', Authorization: `Bearer ${token}`},
                    body: JSON.stringify({name, bio, rider_weight_kg: weight, ftp_w: ftp})
                });
                if (!resp.ok) { const text = await resp.text(); throw new Error(text || 'Save failed'); }
                showStatus('Profile saved', true);
            } catch (err) {
                showStatus('Save profile failed: ' + err.message, false);
            }
        }

        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (!oldPassword || !newPassword || !confirmPassword) { showStatus('Please fill all password fields', false); return; }
            if (newPassword !== confirmPassword) { showStatus('New passwords do not match', false); return; }

            try {
                const resp = await apiFetch('/auth/password', {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json', Authorization: `Bearer ${token}`},
                    body: JSON.stringify({old_password: oldPassword, new_password: newPassword})
                });
                if (!resp.ok) { const text = await resp.text(); throw new Error(text || 'Password change failed'); }
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                showStatus('Password changed successfully', true);
            } catch (err) {
                showStatus('Change password failed: ' + err.message, false);
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
