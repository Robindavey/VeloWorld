<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloWorld - Cycling Route Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .upload-form {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input[type="text"],
        .form-group input[type="file"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input[type="file"] {
            padding: 8px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .routes-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .route-item {
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            transition: box-shadow 0.3s;
        }

        .route-item:hover {
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .route-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .route-meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .route-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-queued { background: #fff3cd; color: #856404; }
        .status-processing { background: #cce5ff; color: #004085; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }

        .route-actions {
            margin-top: 10px;
        }

        .route-actions .btn {
            width: auto;
            margin-right: 10px;
            padding: 6px 12px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b3d7ff;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🚴 VeloWorld</h1>
            <p>Upload your cycling routes and experience them in 3D</p>
        </header>

        <div id="alert-container"></div>

        <div class="main-content">
            <div class="panel">
                <h2>📤 Upload Route</h2>
                <form id="upload-form" class="upload-form">
                    <div class="form-group">
                        <label for="route-name">Route Name</label>
                        <input type="text" id="route-name" placeholder="Enter route name" required>
                    </div>

                    <div class="form-group">
                        <label for="route-description">Description (Optional)</label>
                        <textarea id="route-description" placeholder="Describe your route..." rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="route-file">Route File</label>
                        <input type="file" id="route-file" accept=".gpx,.fit,.tcx" required>
                        <small style="color: #666; margin-top: 5px; display: block;">
                            Supported formats: GPX, FIT, TCX
                        </small>
                    </div>

                    <button type="submit" class="btn" id="upload-btn">
                        <span id="upload-text">Upload & Process Route</span>
                    </button>
                </form>
            </div>

            <div class="panel">
                <h2>📋 Your Routes</h2>
                <div id="routes-list" class="routes-list">
                    <p style="color: #666; text-align: center; margin: 40px 0;">
                        No routes uploaded yet. Upload your first route!
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API configuration
        const API_BASE = 'http://localhost:8080';

        // DOM elements
        const uploadForm = document.getElementById('upload-form');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadText = document.getElementById('upload-text');
        const routesList = document.getElementById('routes-list');
        const alertContainer = document.getElementById('alert-container');

        // Current user session
        let currentUser = null;
        let authToken = localStorage.getItem('veloworld_token');

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            if (authToken) {
                // Try to get current user
                fetchCurrentUser();
            } else {
                showLoginPrompt();
            }

            // Load routes if authenticated
            if (authToken) {
                loadRoutes();
            }
        });

        // Form submission
        uploadForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!authToken) {
                showAlert('Please log in first', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('name', document.getElementById('route-name').value);
            formData.append('description', document.getElementById('route-description').value);
            formData.append('route_file', document.getElementById('route-file').files[0]);

            uploadBtn.disabled = true;
            uploadText.innerHTML = '<div class="loading"></div>Uploading...';

            try {
                const response = await fetch(`${API_BASE}/routes`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: formData
                });

                if (response.ok) {
                    const route = await response.json();
                    showAlert('Route uploaded successfully! Processing will begin shortly.', 'success');
                    uploadForm.reset();
                    loadRoutes(); // Refresh routes list
                } else {
                    const error = await response.text();
                    showAlert(`Upload failed: ${error}`, 'error');
                }
            } catch (error) {
                showAlert(`Upload failed: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadText.textContent = 'Upload & Process Route';
            }
        });

        // Load routes
        async function loadRoutes() {
            if (!authToken) return;

            try {
                const response = await fetch(`${API_BASE}/routes`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const routes = await response.json();
                    displayRoutes(routes);
                } else if (response.status === 401) {
                    // Token expired
                    localStorage.removeItem('veloworld_token');
                    authToken = null;
                    showLoginPrompt();
                }
            } catch (error) {
                showAlert(`Failed to load routes: ${error.message}`, 'error');
            }
        }

        // Display routes
        function displayRoutes(routes) {
            if (routes.length === 0) {
                routesList.innerHTML = '<p style="color: #666; text-align: center; margin: 40px 0;">No routes uploaded yet. Upload your first route!</p>';
                return;
            }

            routesList.innerHTML = routes.map(route => `
                <div class="route-item">
                    <div class="route-name">${route.name}</div>
                    <div class="route-meta">
                        ${route.distance_m ? `Distance: ${(route.distance_m / 1000).toFixed(1)}km` : ''}
                        ${route.elevation_gain_m ? ` • Elevation: ${route.elevation_gain_m.toFixed(0)}m` : ''}
                        ${route.description ? `<br>${route.description}` : ''}
                    </div>
                    <div class="route-status status-${route.processing_status}">
                        ${route.processing_status}
                    </div>
                    <div class="route-actions">
                        ${route.processing_status === 'completed' ?
                            `<button class="btn" onclick="downloadRoute('${route.id}')">Download Package</button>
                             <button class="btn" onclick="startRide('${route.id}')">Start Ride</button>` :
                            route.processing_status === 'failed' ?
                            `<button class="btn" onclick="retryRoute('${route.id}')">Retry Processing</button>` :
                            '<em>Processing... Please wait.</em>'
                        }
                    </div>
                </div>
            `).join('');
        }

        // Download route package
        async function downloadRoute(routeId) {
            try {
                const response = await fetch(`${API_BASE}/routes/${routeId}/package`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `route_${routeId}_package.json`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    showAlert('Failed to download route package', 'error');
                }
            } catch (error) {
                showAlert(`Download failed: ${error.message}`, 'error');
            }
        }

        // Start ride (placeholder)
        function startRide(routeId) {
            showAlert('Ride simulation coming soon! 🚴‍♂️', 'info');
        }

        // Retry route processing
        async function retryRoute(routeId) {
            showAlert('Retry functionality coming soon!', 'info');
        }

        // Authentication helpers
        function showLoginPrompt() {
            const loginHtml = `
                <div class="panel" style="margin-bottom: 20px;">
                    <h2>🔐 Authentication Required</h2>
                    <p>Please authenticate to upload and manage routes.</p>
                    <div style="margin-top: 20px;">
                        <button class="btn" onclick="showLoginForm()">Login</button>
                        <button class="btn" onclick="showRegisterForm()" style="margin-left: 10px;">Register</button>
                    </div>
                </div>
            `;
            document.querySelector('.main-content').insertAdjacentHTML('beforebegin', loginHtml);
        }

        function showLoginForm() {
            // Simple login form (in production, use proper auth)
            const email = prompt('Email:');
            const password = prompt('Password:');

            if (email && password) {
                // Mock authentication - in production, call auth API
                authToken = 'mock_token_' + Date.now();
                localStorage.setItem('veloworld_token', authToken);
                location.reload();
            }
        }

        function showRegisterForm() {
            // Simple registration form
            const email = prompt('Email:');
            const password = prompt('Password:');

            if (email && password) {
                showAlert('Registration successful! Please login.', 'success');
                showLoginForm();
            }
        }

        async function fetchCurrentUser() {
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    currentUser = await response.json();
                } else {
                    localStorage.removeItem('veloworld_token');
                    authToken = null;
                }
            } catch (error) {
                localStorage.removeItem('veloworld_token');
                authToken = null;
            }
        }

        // Alert system
        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;

            alertContainer.appendChild(alert);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.parentNode.removeChild(alert);
                }
            }, 5000);
        }

        // Auto-refresh routes every 30 seconds
        setInterval(() => {
            if (authToken) {
                loadRoutes();
            }
        }, 30000);
    </script>
</body>
</html>
